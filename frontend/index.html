<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>小星星任务宝</title>
<style>
:root{--p:#FF6B35;--pl:#FFF0EB;--g:#FFD700;--gd:#C9A000;--bg:#FFF8F0;--c:#FFF;--t:#333;--tl:#888;--s:#4CAF50;--d:#F44336;--bd:#F0E8E0;--sh:0 2px 12px rgba(255,107,53,.12);--r:16px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'PingFang SC','Helvetica Neue',sans-serif;background:var(--bg);color:var(--t);min-height:100vh;padding-bottom:80px}
.hh{background:linear-gradient(135deg,#FF6B35,#FF9A5C);color:#FFF;padding:24px 20px 20px;border-radius:0 0 24px 24px}
.hh-top{display:flex;justify-content:space-between;align-items:flex-start}
.hh-title{font-size:22px;font-weight:700}
.hh-sub{font-size:13px;opacity:.85;margin-top:4px}
.hh-btn{background:rgba(255,255,255,.25);border:none;color:#FFF;padding:8px 16px;border-radius:20px;font-size:13px;cursor:pointer}
.hh-bal{display:flex;gap:20px;margin-top:20px}
.bi{text-align:center}
.bi-num{font-size:32px;font-weight:800;line-height:1}
.bi-lbl{font-size:12px;opacity:.8;margin-top:4px}
.cd{background:var(--c);border-radius:var(--r);padding:16px;margin:16px;box-shadow:var(--sh);border:1px solid var(--bd)}
.cd-tit{font-size:15px;font-weight:700;color:var(--p);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.bs{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.bs::-webkit-scrollbar{display:none}
.bi-itm{display:flex;flex-direction:column;align-items:center;min-width:60px}
.bi-cir{width:52px;height:52px;border-radius:50%;background:var(--pl);display:flex;align-items:center;justify-content:center;font-size:26px;border:2px solid #FFE0D0}
.bi-cir.lk{opacity:.35;filter:grayscale(1)}
.bi-nm{font-size:10px;color:var(--tl);margin-top:4px;text-align:center;white-space:nowrap}
.sg{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.sc{display:flex;flex-direction:column;align-items:center;background:var(--pl);border-radius:12px;padding:8px 4px}
.sc-em{font-size:28px}
.sc-ct{font-size:11px;color:var(--p);font-weight:600;margin-top:2px}
.ti{display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid var(--bd)}
.ti:last-child{border-bottom:none}
.ti-l{flex:1}
.ti-ttl{font-size:15px;font-weight:600}
.ti-meta{font-size:12px;color:var(--tl);margin-top:3px;display:flex;gap:8px;align-items:center}
.ti-str{font-size:13px;color:var(--gd);font-weight:600}
.tb{padding:8px 16px;border-radius:20px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:transform .1s}
.tb:active{transform:scale(.95)}
.b-sb{background:var(--g);color:#7A5000}
.b-ap{background:var(--s);color:#FFF}
.b-rj{background:#EEE;color:var(--tl)}
.bt{display:flex;background:#FFF;border-top:1px solid var(--bd);position:fixed;bottom:0;left:0;right:0;z-index:100;padding-bottom:env(safe-area-inset-bottom,0)}
.tb2{flex:1;text-align:center;padding:12px 0;border:none;background:none;color:var(--tl);font-size:11px;cursor:pointer;transition:color .2s}
.tb2.on{color:var(--p)}
.tb2-ic{font-size:22px;display:block;margin-bottom:3px}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end;justify-content:center}
.ov.sh{display:flex}
.mt{background:#FFF;border-radius:24px 24px 0 0;width:100%;max-width:480px;padding:24px 20px 40px;animation:su .3s ease}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mh{width:40px;height:4px;background:#DDD;border-radius:2px;margin:0 auto 20px}
.mt-tit{font-size:18px;font-weight:700;text-align:center;margin-bottom:20px}
.fg{margin-bottom:16px}
.fl{font-size:13px;color:var(--tl);display:block;margin-bottom:6px}
.fi{width:100%;padding:12px 16px;border:2px solid var(--bd);border-radius:12px;font-size:15px;background:var(--bg);transition:border-color .2s;outline:none}
.fi:focus{border-color:var(--p)}
.fs{width:100%;padding:12px 16px;border:2px solid var(--bd);border-radius:12px;font-size:15px;background:var(--bg);appearance:none;cursor:pointer}
.fb{width:100%;padding:14px;background:var(--p);color:#FFF;border:none;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;margin-top:8px;transition:opacity .2s}
.fb:active{opacity:.85}
.fb2{background:#FFF;color:var(--p);border:2px solid var(--p)}
.tt{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);background:#333;color:#FFF;padding:12px 24px;border-radius:30px;font-size:14px;z-index:300;transition:transform .3s ease;white-space:nowrap}
.tt.sh{transform:translateX(-50%) translateY(0)}
.pg{display:none}
.pg.on{display:block}
.lb{min-height:100vh;background:linear-gradient(135deg,#FF6B35,#FF9A5C);display:flex;align-items:center;justify-content:center;padding:20px}
.lx{background:#FFF;border-radius:24px;padding:32px 24px;width:100%;max-width:360px;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.lx-lo{text-align:center;font-size:48px;margin-bottom:8px}
.lx-ti{text-align:center;font-size:22px;font-weight:800;color:var(--p);margin-bottom:24px}
.rb{background:linear-gradient(135deg,#FFD700,#FFA500);border-radius:var(--r);padding:16px;margin:16px;color:#5A3000;text-align:center}
.rb-stars{font-size:36px;font-weight:800}
.rb-lbl{font-size:13px;opacity:.8}
.et{text-align:center;padding:40px 20px;color:var(--tl);font-size:14px}
.et-ic{font-size:48px;opacity:.4;display:block;margin-bottom:12px}
.pk{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;text-align:center}
.pk-n{font-size:24px;font-weight:800;color:var(--p)}
.pk-l{font-size:12px;color:var(--tl)}
</style>
</head>
<body>
<div class="tt" id="toast"></div>

<!-- Login -->
<div id="scr-login" class="pg on">
<div class="lb">
<div class="lx">
<div class="lx-lo">⭐</div>
<div class="lx-ti">小星星任务宝</div>
<div class="fg"><label class="fl">用户名</label><input class="fi" id="in-user" placeholder="输入用户名" autocomplete="off"/></div>
<div class="fg"><label class="fl">密码</label><input class="fi" id="in-pwd" type="password" placeholder="输入密码"/></div>
<button class="fb" onclick="login()">登录</button>
<button class="fb fb2" onclick="goReg()" style="margin-top:10px">注册家庭</button>
</div>
</div>
</div>

<!-- Register -->
<div id="scr-reg" class="pg">
<div class="lb">
<div class="lx">
<div class="lx-lo">🏠</div>
<div class="lx-ti">创建家庭</div>
<div class="fg"><label class="fl">你的名字</label><input class="fi" id="r-nick" placeholder="例如：爸爸"/></div>
<div class="fg"><label class="fl">用户名</label><input class="fi" id="r-user" placeholder="3位以上字母或数字"/></div>
<div class="fg"><label class="fl">密码</label><input class="fi" id="r-pwd" type="password" placeholder="至少4位"/></div>
<button class="fb" onclick="reg()">创建家庭</button>
<button class="fb fb2" onclick="goLogin()" style="margin-top:10px">已有账号？登录</button>
</div>
</div>
</div>

<!-- App -->
<div id="scr-app" class="pg">

<div class="hh">
<div class="hh-top">
<div><div class="hh-title">⭐ 小星星任务宝</div><div class="hh-sub" id="h-sub">加载中...</div></div>
<div style="display:flex;gap:8px">
<button class="hh-btn" onclick="tab('rew')">奖励</button>
<button class="hh-btn" onclick="logout()">退出</button>
</div>
</div>
<div class="hh-bal">
<div class="bi"><div class="bi-num" id="h-star">0</div><div class="bi-lbl">星星币</div></div>
<div class="bi"><div class="bi-num" id="h-sticker">0</div><div class="bi-lbl">贴纸</div></div>
<div class="bi"><div class="bi-num" id="h-badge">0</div><div class="bi-lbl">徽章</div></div>
</div>
</div>

<!-- Tasks Tab -->
<div id="tab-tasks" class="on">
<div class="cd"><div class="cd-tit">📋 我的任务</div><div id="task-list"></div></div>
</div>

<!-- Rewards Tab -->
<div id="tab-rew" style="display:none">
<div class="rb"><div class="rb-lbl">当前星星币余额</div><div class="rb-stars" id="rew-star">0</div></div>
<div class="cd"><div class="cd-tit">🎖️ 徽章收藏</div><div class="bs" id="badge-list" style="padding:4px 0"></div></div>
<div class="cd"><div class="cd-tit">🌟 贴纸收集</div><div class="sg" id="sticker-grid"></div></div>
<div class="cd"><div class="cd-tit">📊 星星币奖励规则</div><div id="rew-rules"></div></div>
</div>

<!-- Parent Tab -->
<div id="tab-par" style="display:none">
<div class="cd"><div class="cd-tit">👨‍👧 待审核 <span id="pend-count"></span></div><div id="pend-list"></div></div>
<div class="cd"><div class="cd-tit">➕ 创建新任务</div>
<div class="fg"><label class="fl">任务名称</label><input class="fi" id="t-title" placeholder="例如：整理书包"/></div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
<div class="fg"><label class="fl">分配给</label><select class="fs" id="t-kid"></select></div>
<div class="fg"><label class="fl">类别</label><select class="fs" id="t-cat">
<option value="habit">🌟 日常习惯</option><option value="study">📚 学业</option>
<option value="housework">🏠 家务</option><option value="creative">🎨 创意</option>
</select></div>
</div>
<div class="fg"><label class="fl">难度</label><select class="fs" id="t-diff">
<option value="1">⭐ 难度1 → 3星星</option>
<option value="2">⭐⭐ 难度2 → 5星星</option>
<option value="3" selected>⭐⭐⭐ 难度3 → 8星星</option>
<option value="4">⭐⭐⭐⭐ 难度4 → 12星星</option>
<option value="5">⭐⭐⭐⭐⭐ 难度5 → 18星星</option>
</select></div>
<button class="fb" onclick="newTask()">创建任务</button>
</div>
<div class="cd"><div class="cd-tit">📊 本周统计</div><div class="pk" id="week-stats"></div></div>
<div class="cd"><div class="cd-tit">👶 添加孩子</div>
<div class="fg"><label class="fl">孩子名字</label><input class="fi" id="c-name" placeholder="例如：小明"/></div>
<button class="fb" onclick="addKid()">添加孩子（密码123456）</button>
</div>
<div class="cd"><div class="cd-tit">🔗 邀请码</div>
<div style="text-align:center"><div style="font-size:32px;font-weight:800;color:var(--p);letter-spacing:4px" id="inv-code">--</div>
<div style="font-size:12px;color:var(--tl);margin-top:6px">分享给家人</div></div>
</div>
</div>

<!-- Bottom Nav -->
<div class="bt">
<button class="tb2 on" id="tab-btn-task" onclick="tab('tasks')"><span class="tb2-ic">📋</span>任务</button>
<button class="tb2" id="tab-btn-rew" onclick="tab('rew')"><span class="tb2-ic">🎁</span>奖励</button>
<button class="tb2" id="tab-btn-par" onclick="tab('par')" style="display:none"><span class="tb2-ic">👨‍👧</span>家长</button>
</div>
</div>

<script>
const API = "http://127.0.0.1:5000";
let G = {};

function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("sh");
  setTimeout(() => t.classList.remove("sh"), 2500);
}

async function req(method, path, body) {
  try {
    const opts = { method, headers: {"Content-Type":"application/json"} };
    if (G.token) opts.headers["Authorization"] = 'Bearer ' + G.token;
    if (body !== undefined) opts.body = JSON.stringify(body);
    const r = await fetch(API + path, opts);
    const j = await r.json().catch(() => ({}));
    if (j.error) { toast("" + j.error); return null; }
    return j.data;
  } catch(e) { toast("网络异常"); return null; }
}

function showScr(id) {
  ["login","reg","app"].forEach(s => document.getElementById("scr-" + s).classList.remove("on"));
  document.getElementById("scr-" + id).classList.add("on");
}

function goLogin() { showScr("login"); }
function goReg() { showScr("reg"); }

async function login() {
  const u = document.getElementById("in-user").value.trim();
  const p = document.getElementById("in-pwd").value;
  if (!u || !p) { toast("请输入用户名和密码"); return; }
  const d = await req("POST", "/auth/login", {username:u, password:p});
  if (!d) return;
  G = {...d};
  showScr("app");
  loadAll();
}

async function reg() {
  const nick = document.getElementById("r-nick").value.trim();
  const u = document.getElementById("r-user").value.trim();
  const p = document.getElementById("r-pwd").value;
  if (!nick || !u || !p) { toast("请填写完整"); return; }
  if (u.length < 3) { toast("用户名至少3位"); return; }
  if (p.length < 4) { toast("密码至少4位"); return; }
  const d = await req("POST", "/auth/register", {family_name:"我的家", username:u, password:p, nickname:nick});
  if (!d) return;
  G = {...d};
  showScr("app");
  loadAll();
}

async function logout() {
  await req("POST", "/auth/logout", {});
  G = {};
  showScr("login");
}

async function loadAll() {
  document.getElementById("h-sub").textContent = G.role === "parent" ? "家长模式 👨‍👧" : "孩子模式 ⭐";
  document.getElementById("tab-btn-par").style.display = G.role === "parent" ? "" : "none";
  tab("tasks");
  await loadProfile();
  if (G.role === "child") await loadTasks();
  else await loadParent();
}

async function loadProfile() {
  let d;
  if (G.role === "child") {
    d = await req("GET", "/child/profile");
    if (!d) return;
    document.getElementById("h-star").textContent = d.balance.total;
    document.getElementById("h-sticker").textContent = d.stickers.length;
    document.getElementById("h-badge").textContent = d.badges.length;
  } else {
    const kids = await req("GET", "/rewards/children");
    if (!kids) return;
    const t = kids.reduce((s,c) => s+(c.total||0), 0);
    const sc = kids.reduce((s,c) => s+(c.sticker_count||0), 0);
    const bc = kids.reduce((s,c) => s+(c.badge_count||0), 0);
    document.getElementById("h-star").textContent = t;
    document.getElementById("h-sticker").textContent = sc;
    document.getElementById("h-badge").textContent = bc;
  }
}

function tab(name) {
  const tabs = ["tasks","rew","par"];
  tabs.forEach(t => {
    document.getElementById("tab-" + t).style.display = "none";
    document.getElementById("tab-btn-" + t.slice(0,3)).classList.remove("on");
  });
  document.getElementById("tab-" + name).style.display = name === "rew" ? "block" : "";
  if (name !== "rew") document.getElementById("tab-" + name).classList.add("on");
  document.getElementById("tab-btn-" + name.slice(0,3)).classList.add("on");
  if (name === "tasks") loadTasks();
  if (name === "rew") loadRew();
  if (name === "par") loadParent();
}

async function loadTasks() {
  const d = await req("GET", "/tasks");
  const el = document.getElementById("task-list");
  if (!d) { el.innerHTML = '<div class="et"><span class="et-ic">📋</span>加载失败</div>'; return; }
  if (!d.length) { el.innerHTML = '<div class="et"><span class="et-ic">🎉</span>太棒了！暂无待完成任务</div>'; return; }
  el.innerHTML = d.map(t => `
  <div class="ti">
    <div class="ti-l">
      <div class="ti-ttl">${e(t.title)}</div>
      <div class="ti-meta">
        <span class="ti-str">⭐${t.star_reward}星</span>
        <span>${catEmoji(t.category)} 难度${t.difficulty}</span>
      </div>
    </div>
    <button class="tb b-sb" onclick="doSubmit(${t.id})">完成！</button>
  </div>`).join("");
}

async function loadRew() {
  const cat = await req("GET", "/rewards/catalog");
  let d;
  if (G.role === "child") d = await req("GET", "/child/profile");
  else { const kids = await req("GET", "/rewards/children"); d = kids && kids[0] ? kids[0] : {total:0}; }
  if (!cat || !d) return;
  document.getElementById("rew-star").textContent = G.role === "child" ? d.balance.total : (d.total||0);

  const earnedSet = new Set(G.role === "child" ? d.badges.map(b=>b.key) : []);
  const bl = document.getElementById("badge-list");
  bl.innerHTML = cat.badges.map(b => {
    const lk = !earnedSet.has(b.key);
    return `<div class="bi-itm"><div class="bi-cir ${lk?'lk':''}">${b.emoji}</div><div class="bi-nm">${b.name}</div></div>`;
  }).join("");

  const rules = document.getElementById("rew-rules");
  rules.innerHTML = Object.entries(cat.star_reward_table).map(([k,v]) =>
    `<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--bd)">
      <span>${"⭐".repeat(Number(k))} 难度${k}</span>
      <span style="color:var(--gd);font-weight:700">${v}星星</span>
    </div>`).join("");

  const stickers = G.role === "child" ? d.stickers : [];
  const cntMap = {};
  stickers.forEach(s => cntMap[s.sticker_key] = (cntMap[s.sticker_key]||0)+1);
  const allS = [];
  Object.values(cat.sticker_themes).forEach(a => a.forEach(s => allS.push(s)));
  const sg = document.getElementById("sticker-grid");
  sg.innerHTML = allS.map(s => {
    const n = cntMap[s.id]||0;
    return `<div class="sc"><span class="sc-em">${s.emoji}</span><span class="sc-ct">${n>0?"x"+n:""}</span></div>`;
  }).join("");
}

async function loadParent() {
  const pend = await req("GET", "/tasks/pending");
  const pl = document.getElementById("pend-list");
  const cnt = pend ? pend.length : 0;
  document.getElementById("pend-count").textContent = cnt ? "(" + cnt + ")" : "";
  if (!pend || !pend.length) pl.innerHTML = '<div class="et"><span class="et-ic">🎉</span>没有待审核任务</div>';
  else pl.innerHTML = pend.map(t => `
  <div class="ti">
    <div class="ti-l">
      <div class="ti-ttl">${e(t.title)}</div>
      <div class="ti-meta"><span>${e(t.child_name||"孩子")}</span><span class="ti-str">⭐${t.star_reward}星</span></div>
    </div>
    <button class="tb b-ap" onclick="doApprove(${t.id})">通过</button>
    <button class="tb b-rj" onclick="doReject(${t.id})">拒绝</button>
  </div>`).join("");

  const kids = await req("GET", "/rewards/children");
  const sel = document.getElementById("t-kid");
  if (kids) sel.innerHTML = kids.map(c => `<option value="${c.id}">${e(c.nickname)}</option>`).join("");

  const stats = await req("GET", "/stats/weekly");
  const ws = document.getElementById("week-stats");
  if (stats) ws.innerHTML = `
    <div><div class="pk-n">${stats.completed}</div><div class="pk-l">完成任务</div></div>
    <div><div class="pk-n" style="color:var(--g)">${stats.coins_this_week}</div><div class="pk-l">本周星星</div></div>
    <div><div class="pk-n" style="color:var(--d)">${stats.pending_review}</div><div class="pk-l">待审核</div></div>`;

  const inv = await req("GET", "/family/invite");
  if (inv) document.getElementById("inv-code").textContent = inv.invite_code;
}

async function doSubmit(id) {
  const r = await req("POST", `/tasks/${id}/submit`, {});
  if (!r) return;
  toast("🎉 已提交！等家长审核~");
  loadTasks();
  loadProfile();
}

async function doApprove(id) {
  const r = await req("POST", `/tasks/${id}/approve`, {});
  if (!r) return;
  let m = "✅ 通过！+" + r.stars_earned + "星星";
  if (r.new_badges && r.new_badges.length) r.new_badges.forEach(b => m += " " + b.emoji + b.name);
  toast(m);
  loadParent();
  loadProfile();
}

async function doReject(id) {
  const r = await req("POST", `/tasks/${id}/reject`, {comment:""});
  if (!r) return;
  toast("已拒绝");
  loadParent();
}

async function newTask() {
  const title = document.getElementById("t-title").value.trim();
  const kid = document.getElementById("t-kid").value;
  const cat = document.getElementById("t-cat").value;
  const diff = document.getElementById("t-diff").value;
  if (!title) { toast("请输入任务名称"); return; }
  if (!kid) { toast("请选择分配对象"); return; }
  const d = await req("POST", "/tasks", {title, assigned_id:Number(kid), category:cat, difficulty:Number(diff)});
  if (!d) return;
  toast("✅ 任务已创建！奖励" + d.star_reward + "星星");
  document.getElementById("t-title").value = "";
  loadParent();
}

async function addKid() {
  const name = document.getElementById("c-name").value.trim();
  if (!name) { toast("请输入孩子名字"); return; }
  const d = await req("POST", "/family/join", {child_name:name});
  if (!d) return;
  toast("✅ " + d.nickname + " 已添加！默认密码：123456");
  document.getElementById("c-name").value = "";
  loadParent();
}

function catEmoji(c) { return {habit:"🌟",study:"📚",housework:"🏠",creative:"🎨"}[c]||"📋"; }
